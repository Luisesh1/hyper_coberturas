# ══════════════════════════════════════════════
# Hyperliquid Bot — Docker Compose (PRODUCCION)
# ══════════════════════════════════════════════
#
# Arquitectura:
#   nginx:80  ←→  browser
#     ├── /api/*  → server:3001  (REST API)
#     ├── /ws     → server:3001  (WebSocket del bot)
#     └── /*      → archivos estaticos del build de React (servidos por nginx)
#
# Requisitos:
#   1. Crear .env en la raiz con POSTGRES_PASSWORD y CLIENT_URL
#   2. Crear server/.env con JWT_SECRET, SETTINGS_ENCRYPTION_KEY, etc.
#   Ver DEPLOYMENT.md para instrucciones completas.
#
# Uso:
#   docker compose -f docker-compose.prod.yml up --build -d
#   docker compose -f docker-compose.prod.yml down
#   docker compose -f docker-compose.prod.yml logs -f
# ══════════════════════════════════════════════

services:

  # ── Reverse proxy + archivos estaticos del frontend ────────────────
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile.prod
    container_name: testbot-nginx-prod
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_TLS_PORT:-443}:443"
    volumes:
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - testbot-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  # ── Certbot (solo se invoca manualmente con profile bootstrap) ─────
  certbot:
    image: certbot/certbot:latest@sha256:78a7eaa40af657301e25731297b6e73646c695370d17e9bb03189fa82966d65c
    container_name: testbot-certbot
    profiles:
      - bootstrap
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    # Uso:
    #   docker compose -f docker-compose.prod.yml --profile bootstrap run --rm certbot \
    #     certonly --webroot -w /var/www/certbot -d ${SERVER_NAME} --email ${CERTBOT_EMAIL} --agree-tos --non-interactive
    # Luego descomentar el bloque HTTPS en nginx/nginx.prod.conf y reiniciar nginx.
    entrypoint: ["certbot"]

  # ── Base de datos PostgreSQL ────────────────────────────────────────
  postgres:
    # Pin por digest: cualquier "refresh" del tag remoto NO cambia el bit
    # de imagen usado. Actualizar conscientemente verificando release notes.
    image: postgres:16-alpine@sha256:20edbde7749f822887a1a022ad526fde0a47d6b2be9a8364433605cf65099416
    container_name: testbot-postgres-prod
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-testbot}
      POSTGRES_USER:     ${POSTGRES_USER:-testbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requerido — ver DEPLOYMENT.md}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_backups:/backups
    restart: unless-stopped
    networks:
      - testbot-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-testbot} -d ${POSTGRES_DB:-testbot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 512M

  # ── Backup pg_dump (cron sidecar) ───────────────────────────────────
  backup:
    image: postgres:16-alpine@sha256:20edbde7749f822887a1a022ad526fde0a47d6b2be9a8364433605cf65099416
    container_name: testbot-backup
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST:     postgres
      PGPORT:     "5432"
      PGUSER:     "${POSTGRES_USER:-testbot}"
      PGPASSWORD: "${POSTGRES_PASSWORD:?requerido}"
      PGDATABASE: "${POSTGRES_DB:-testbot}"
      BACKUP_DIR: /backups
      BACKUP_RETENTION_DAYS: "${BACKUP_RETENTION_DAYS:-7}"
      BACKUP_CRON: "${BACKUP_CRON:-0 3 * * *}"
    volumes:
      - postgres_backups:/backups
      - ./scripts/backup.sh:/usr/local/bin/backup.sh:ro
    # Registra el cron y mantiene el contenedor vivo. crond ejecuta backup.sh
    # según BACKUP_CRON (default: 03:00 UTC todos los días).
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "$$BACKUP_CRON sh /usr/local/bin/backup.sh >> /var/log/backup.log 2>&1" > /etc/crontabs/root
        touch /var/log/backup.log
        crond -f -l 8 &
        CRON_PID=$$!
        tail -n 0 -F /var/log/backup.log &
        wait $$CRON_PID
    restart: unless-stopped
    networks:
      - testbot-net
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 128M

  # ── Backend Node.js (produccion, sin nodemon) ──────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
    container_name: testbot-server-prod
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      CLIENT_URL: "${CLIENT_URL:?CLIENT_URL requerido (ej: https://tudominio.com) — ver DEPLOYMENT.md}"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-testbot}:${POSTGRES_PASSWORD:?requerido}@postgres:5432/${POSTGRES_DB:-testbot}"
      DB_SSL: "false"
    volumes:
      - server_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - testbot-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    # Sin 'ports': solo nginx accede al backend internamente

volumes:
  postgres_data:
    name: testbot-postgres-data
  postgres_backups:
    name: testbot-postgres-backups
  server_data:
    name: testbot-server-data
  certbot_certs:
    name: testbot-certbot-certs
  certbot_webroot:
    name: testbot-certbot-webroot

networks:
  testbot-net:
    name: testbot-network
    driver: bridge
