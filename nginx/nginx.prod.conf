# ──────────────────────────────────────────────
# nginx — Produccion
# Sirve archivos estaticos del build de React +
# reverse proxy para API y WebSocket del backend
# ──────────────────────────────────────────────

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream backend {
    server server:3001;
}

# Rate limiting: 10 req/s por IP para la API
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

server {
    listen 80;
    server_name hypercover.luisesh1.duckdns.org _;

    # Ocultar version de nginx
    server_tokens off;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Security headers ─────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Compresion gzip
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types      text/plain text/css application/json
                    application/javascript text/xml application/xml
                    application/xml+rss text/javascript image/svg+xml;

    # ── API REST (con rate limiting) ─────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Algunas operaciones on-chain (ej. finalize de modify-range /
        # rebalance) esperan varios receipts y refrescan snapshots antes
        # de responder. Debe quedar por encima del timeout del cliente.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── WebSocket del bot (/ws) ──────────────────────────────────────
    location /ws {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Archivos estaticos con cache agresivo ────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|map)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA: siempre devolver index.html para rutas de React ────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
