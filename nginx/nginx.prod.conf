# ──────────────────────────────────────────────
# nginx — Produccion
# Sirve archivos estaticos del build de React +
# reverse proxy para API y WebSocket del backend
#
# TLS:
#   El bloque HTTPS queda listo pero sólo se activa si existen
#   certificados en /etc/letsencrypt/live/${SERVER_NAME}/.
#   Para emitir:
#     docker compose -f docker-compose.prod.yml --profile bootstrap run --rm certbot
#   Una vez obtenidos, cambiar SSL_ENABLED=1 en .env y reiniciar nginx.
# ──────────────────────────────────────────────

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream backend {
    server server:3001;
}

# Rate limiting: 10 req/s por IP para la API
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

# ── HTTP (puerto 80) ────────────────────────────────────────────────
# - Sirve challenges ACME (/.well-known/acme-challenge/) para certbot
# - Redirige al resto del tráfico a HTTPS (cuando existe cert)
# - Si aún no hay cert, sirve la app directamente (modo bootstrap)
server {
    listen 80;
    server_name hypercover.luisesh1.duckdns.org _;

    server_tokens off;

    # ACME challenges (certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # Modo "ya hay cert": redirige todo lo demás a https. Se activa
    # copiando nginx/tls-redirect.conf a /etc/nginx/conf.d/ o montándolo.
    # Por defecto, si existe /etc/letsencrypt/live/.../fullchain.pem,
    # el operador debe cambiar esta location a:
    #
    #   location / { return 301 https://$host$request_uri; }
    #
    # Mientras no haya cert, la app sigue sirviendo por HTTP (bootstrap).

    root  /usr/share/nginx/html;
    index index.html;

    # ── Security headers (HTTP fallback) ─────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    # CSP estricta. 'unsafe-inline' temporal para compatibilidad con estilos en línea;
    # removerlo tras migrar a nonces o CSS externo.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' ws: wss: https://api.hyperliquid.xyz wss://api.hyperliquid.xyz https://*.alchemy.com wss://*.alchemy.com https://*.publicnode.com https://*.etherscan.io https://api.telegram.org https://walletconnect.com https://*.walletconnect.com wss://*.walletconnect.com wss://*.walletconnect.org; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types      text/plain text/css application/json
                    application/javascript text/xml application/xml
                    application/xml+rss text/javascript image/svg+xml;

    # Límite de tamaño de request (previene uploads de payloads grandes)
    client_max_body_size 2m;

    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /ws {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # PWA: service worker y manifest deben revalidarse siempre para que
    # los clientes detecten nuevas versiones sin quedar atrapados en cache.
    location = /sw.js {
        add_header Cache-Control "no-cache, max-age=0, must-revalidate";
        expires off;
        access_log off;
    }

    location = /registerSW.js {
        add_header Cache-Control "no-cache, max-age=0, must-revalidate";
        expires off;
        access_log off;
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache, max-age=0, must-revalidate";
        types { application/manifest+json webmanifest; }
        default_type application/manifest+json;
        expires off;
        access_log off;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, max-age=0, must-revalidate";
        expires off;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|map)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

