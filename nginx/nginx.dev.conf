# ──────────────────────────────────────────────
# nginx — Desarrollo
# Actua como reverse proxy unico:
#   /api/*  -> backend Node.js (puerto 3001)
#   /ws     -> backend Node.js (WebSocket del bot)
#   /*      -> frontend Vite dev server (puerto 5174) + HMR
# ──────────────────────────────────────────────

# Mapa para manejar upgrades de WebSocket correctamente
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream backend {
    server server:3001;
}

upstream frontend {
    server frontend:5174;
}

server {
    listen 80;
    server_name _;

    # Logs de acceso reducidos en dev
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ── API REST ──────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Igual que en prod: algunos finalize on-chain tardan bastante más
        # que una request REST típica, así que no conviene cortarlos a 30s.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── WebSocket del bot (/ws) ───────────────────────────────────────
    location /ws {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Frontend Vite (incluye HMR WebSocket) ────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade         $http_upgrade;
        proxy_set_header   Connection      $connection_upgrade;
        proxy_set_header   Host            $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
    }
}
