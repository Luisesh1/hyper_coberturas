# ══════════════════════════════════════════════
# Hyperliquid Bot — Docker Compose (DESARROLLO)
# ══════════════════════════════════════════════
#
# Arquitectura:
#   nginx:5174  ←→  browser (http://localhost:5174)
#     ├── /api/*  → server:3001  (REST API)
#     ├── /ws     → server:3001  (WebSocket del bot)
#     └── /*      → frontend:5174 (Vite dev + HMR)
#
# Requisitos:
#   1. Crear .env en la raiz con POSTGRES_PASSWORD
#   2. Copiar server/.env.example → server/.env
#   Ver DEPLOYMENT.md para instrucciones completas.
#
# Uso:
#   docker compose up --build          # primer arranque
#   docker compose up                  # arranques siguientes
#   docker compose down                # detener y eliminar contenedores
#   docker compose logs -f server      # ver logs del backend
#
# Produccion: ver docker-compose.prod.yml
# ══════════════════════════════════════════════

services:

  # ── Reverse proxy: unico punto de entrada ──────────────────────────
  nginx:
    image: nginx:alpine
    container_name: testbot-nginx
    ports:
      - "5174:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      server:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ── Base de datos PostgreSQL ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: testbot-postgres
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-testbot}
      POSTGRES_USER:     ${POSTGRES_USER:-testbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requerido — defínelo en .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-testbot} -d ${POSTGRES_DB:-testbot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend Node.js (nodemon para hot reload) ──────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: development
    container_name: testbot-server
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: development
      CLIENT_URL: "http://localhost:5174"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-testbot}:${POSTGRES_PASSWORD:?requerido}@postgres:5432/${POSTGRES_DB:-testbot}"
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules
      - ./server/data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    # Nodemon + chokidar usan inotify para hot-reload — el usuario `node`
    # non-root puede quedarse sin file descriptors al arrancar. Elevamos
    # el limite explicitamente.
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Frontend Vite dev server (HMR incluido) ────────────────────────
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: development
    container_name: testbot-frontend
    environment:
      VITE_PORT: "5174"
    volumes:
      - ./client:/app
      - frontend_node_modules:/app/node_modules
    restart: unless-stopped
    # Vite (chokidar) observa el arbol completo con inotify. Elevamos
    # el limite de FDs para evitar EMFILE con usuario non-root.
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  server_node_modules:
  frontend_node_modules:
  postgres_data:
