# ══════════════════════════════════════════════
# Hyperliquid Bot — Docker Compose (DESARROLLO)
# ══════════════════════════════════════════════
#
# Arquitectura:
#   nginx:5174  ←→  browser (http://localhost:5174)
#     ├── /api/*  → server:3001  (REST API)
#     ├── /ws     → server:3001  (WebSocket del bot)
#     └── /*      → frontend:5174 (Vite dev + HMR)
#
# Uso:
#   docker-compose up --build          # primer arranque
#   docker-compose up                  # arranques siguientes
#   docker-compose down                # detener y eliminar contenedores
#   docker-compose logs -f server      # ver logs del backend
#
# Produccion: ver docker-compose.prod.yml
# ══════════════════════════════════════════════

services:

  # ── Reverse proxy: unico punto de entrada ──────────────────────────
  nginx:
    image: nginx:alpine
    container_name: testbot-nginx
    ports:
      - "5174:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - server
      - frontend
    restart: unless-stopped

  # ── Base de datos PostgreSQL ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: testbot-postgres
    environment:
      POSTGRES_DB:       testbot
      POSTGRES_USER:     testbot
      POSTGRES_PASSWORD: testbot_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testbot -d testbot"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend Node.js (nodemon para hot reload) ──────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: development
    container_name: testbot-server
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: development
      CLIENT_URL: "http://localhost:5174"
      DATABASE_URL: "postgresql://testbot:testbot_pass@postgres:5432/testbot"
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules
      - ./server/data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend Vite dev server (HMR incluido) ────────────────────────
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: development
    container_name: testbot-frontend
    environment:
      VITE_PORT: "5174"
    volumes:
      - ./client:/app
      - frontend_node_modules:/app/node_modules
    restart: unless-stopped

volumes:
  server_node_modules:
  frontend_node_modules:
  postgres_data:
